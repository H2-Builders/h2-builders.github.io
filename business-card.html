<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>H2 Builders – Business Card</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #2C2C2C;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 40px;
      font-family: 'Inter', Arial, sans-serif;
      gap: 50px;
    }

    .page-label {
      color: #888;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: 'Inter', Arial, sans-serif;
    }

    /* ─── CARD DIMENSIONS ───────────────────────────────────────────
       Standard business card: 3.5in × 2in
       Rendered at 200dpi equivalent: 700px × 400px
       (Safe area / bleed handled with padding)
    ─────────────────────────────────────────────────────────────── */
    .card {
      width: 700px;
      height: 400px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════════
       FRONT
    ═══════════════════════════════════════════════════════════════ */
    .card-front {
      width: 100%;
      height: 100%;
      background: #111111;
      display: flex;
      position: relative;
      overflow: hidden;
    }

    /* Background geometric accent */
    .card-front::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 280px;
      height: 280px;
      border: 40px solid rgba(196, 30, 36, 0.08);
      border-radius: 50%;
    }

    .card-front::after {
      content: '';
      position: absolute;
      bottom: -80px;
      right: 80px;
      width: 180px;
      height: 180px;
      border: 25px solid rgba(196, 30, 36, 0.05);
      border-radius: 50%;
    }

    /* Red left accent stripe */
    .front-stripe {
      width: 7px;
      background: #C41E24;
      flex-shrink: 0;
    }

    .front-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 44px 50px 40px 46px;
      position: relative;
      z-index: 1;
    }

    /* ─── LOGO ─── */
    .logo {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .logo-wordmark {
      display: flex;
      align-items: baseline;
      line-height: 1;
      letter-spacing: -2px;
    }

    .logo-h {
      font-size: 86px;
      font-weight: 800;
      color: #FFFFFF;
      line-height: 0.9;
    }

    .logo-2 {
      font-size: 86px;
      font-weight: 800;
      color: #C41E24;
      line-height: 0.9;
    }

    .logo-rule {
      width: 130px;
      height: 2px;
      background: rgba(255,255,255,0.55);
      margin: 7px 0 6px;
    }

    .logo-builders {
      font-size: 20px;
      font-weight: 400;
      color: rgba(255,255,255,0.85);
      letter-spacing: 14.5px;
      text-transform: uppercase;
    }

    /* ─── TAGLINE ─── */
    .tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.5px;
      font-weight: 400;
      margin-top: auto;
    }

    /* ─── CONTACT BLOCK (right column) ─── */
    .front-right {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 44px 50px 40px 0;
      align-items: flex-end;
      gap: 10px;
      position: relative;
      z-index: 1;
      min-width: 220px;
    }

    .contact-name {
      font-size: 17px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 0.3px;
      text-align: right;
      margin-bottom: 6px;
    }

    .contact-title {
      font-size: 11px;
      font-weight: 500;
      color: #C41E24;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: right;
      margin-bottom: 14px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .contact-text {
      font-size: 12.5px;
      color: rgba(255,255,255,0.72);
      font-weight: 400;
      letter-spacing: 0.2px;
      text-align: right;
    }

    .contact-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .divider-line {
      width: 1px;
      height: 80px;
      background: rgba(255,255,255,0.1);
      align-self: flex-end;
      margin: 0 10px 0 20px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════════════════════════
       BACK
    ═══════════════════════════════════════════════════════════════ */
    .card-back {
      width: 100%;
      height: 100%;
      background: #C41E24;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .card-back::before {
      content: '';
      position: absolute;
      top: -100px;
      left: -100px;
      width: 350px;
      height: 350px;
      border: 60px solid rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .card-back::after {
      content: '';
      position: absolute;
      bottom: -120px;
      right: -80px;
      width: 320px;
      height: 320px;
      border: 50px solid rgba(0,0,0,0.06);
      border-radius: 50%;
    }

    .back-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .back-logo-h {
      font-size: 110px;
      font-weight: 800;
      color: rgba(255,255,255,0.95);
      line-height: 0.9;
      letter-spacing: -3px;
    }

    .back-logo-2 {
      font-size: 110px;
      font-weight: 800;
      color: rgba(0,0,0,0.25);
      line-height: 0.9;
      letter-spacing: -3px;
    }

    .back-rule {
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.4);
      margin: 10px 0 8px;
    }

    .back-builders {
      font-size: 23px;
      font-weight: 400;
      color: rgba(255,255,255,0.9);
      letter-spacing: 18px;
      text-transform: uppercase;
    }

    .back-tagline {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.5px;
      margin-top: 10px;
      font-weight: 300;
    }

    /* ─── PRINT STYLES ────────────────────────────────────────── */
    @media print {
      body {
        background: white;
        padding: 0;
        gap: 0;
        display: block;
      }

      .page-label { display: none; }

      .card {
        width: 3.5in;
        height: 2in;
        border-radius: 0;
        box-shadow: none;
        page-break-after: always;
        margin: 0;
        font-size: 0;
      }

      .card * {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .logo-h    { font-size: 38pt; }
      .logo-2    { font-size: 38pt; }
      .logo-builders { font-size: 8.5pt; letter-spacing: 6pt; }
      .logo-rule { width: 57pt; }

      .contact-name  { font-size: 7.5pt; }
      .contact-title { font-size: 5pt; letter-spacing: 1pt; }
      .contact-text  { font-size: 5.5pt; }
      .contact-icon  { width: 7pt; height: 7pt; }
      .tagline       { font-size: 5.5pt; }

      .front-content { padding: 19pt 22pt 18pt 20pt; }
      .front-right   { padding: 19pt 22pt 18pt 0; min-width: 96pt; }
      .front-stripe  { width: 3pt; }

      .back-logo-h  { font-size: 48pt; }
      .back-logo-2  { font-size: 48pt; }
      .back-builders { font-size: 10pt; letter-spacing: 8pt; }
      .back-tagline  { font-size: 5pt; margin-top: 4pt; }
      .back-rule     { width: 70pt; }
    }
  </style>
</head>
<body>

  <p class="page-label">Front</p>

  <!-- ══════════════════ FRONT ══════════════════ -->
  <div class="card">
    <div class="card-front">
      <div class="front-stripe"></div>

      <div class="front-content">
        <!-- Logo -->
        <div class="logo">
          <div class="logo-wordmark">
            <span class="logo-h">H</span><span class="logo-2">2</span>
          </div>
          <div class="logo-rule"></div>
          <div class="logo-builders">Builders</div>
        </div>

        <!-- Tagline at bottom left -->
        <div class="tagline">General Contracting &amp; Renovation · GTA &amp; Surrounding</div>
      </div>

      <!-- Vertical divider -->
      <div class="divider-line"></div>

      <!-- Contact info right column -->
      <div class="front-right">
        <div class="contact-name">Umar Farooq</div>
        <div class="contact-title">Owner &amp; Contractor</div>

        <div class="contact-item">
          <span class="contact-text">647-713-9329</span>
          <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:#C41E24; opacity:1;">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.1 2.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>

        <div class="contact-item">
          <span class="contact-text">umar19960607@gmail.com</span>
          <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:#C41E24; opacity:1;">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </div>

        <div class="contact-item">
          <span class="contact-text">GTA &amp; Surrounding</span>
          <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:#C41E24; opacity:1;">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
        </div>

      </div>
    </div>
  </div>

  <p class="page-label">Back</p>

  <!-- ══════════════════ BACK ══════════════════ -->
  <div class="card">
    <div class="card-back">
      <div class="back-content">
        <div style="display:flex; align-items:baseline; letter-spacing:-3px;">
          <span class="back-logo-h">H</span><span class="back-logo-2">2</span>
        </div>
        <div class="back-rule"></div>
        <div class="back-builders">Builders</div>
        <div class="back-tagline">General Contracting &amp; Renovation · GTA &amp; Surrounding</div>
      </div>
    </div>
  </div>

</body>
</html>
